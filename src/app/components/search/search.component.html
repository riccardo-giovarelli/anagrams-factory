<div class='search__container' [ngClass]="showSearch ? 'search__container--visible':'search__container--hidden'"
  search__container>
  <div class="search__title">{{title}}</div>
  <div class="search__input-container">
    <input id="word-input" [(ngModel)]="word" type="text" class="form-control" [ngClass]="isInvalid ? 'is-invalid' : ''"
      (ngModelChange)="onSearchChange($event)" />
    <div class="invalid-feedback search__invalid-feedback">
      {{invalidMessage}}
    </div>
  </div>
  <div class='search__button-container'>
    <button type="button" class="btn btn-primary search__button"
      [attr.disabled]="isInvalid || localSpinner ? true : null" (click)="getAnagrams()">
      <ng-template [ngIf]="localSpinner">
        <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
      </ng-template>
      Anagrams
    </button>
    <button type="button" class="btn btn-secondary search__button" (click)="clear()">Reset</button>
  </div>
  <div class='search__information'>
    <div class="alert alert-warning" role="alert">
      Notice: calculating anagrams could take a long time when words length grow.
    </div>
  </div>
</div>
