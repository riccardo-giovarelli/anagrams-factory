<div class="dictionary__container">
  <div class="dictionary__table-container table-responsive-md">
    <table class="table">
      <thead class="thead-light">
        <tr>
          <th scope="col">WORD</th>
          <th scope="col">DEFINITION</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let word of words | paginate: { itemsPerPage: 5, currentPage: page }">
          <td>{{word.world}}</td>
          <td>{{word.definition}}</td>
        </tr>
      </tbody>
    </table>
    <div className="dictionary__table-controller">
      <pagination-controls (pageChange)="page = $event" autoHide="true" responsive="true" maxSize="6">
      </pagination-controls>
    </div>
  </div>
</div>
