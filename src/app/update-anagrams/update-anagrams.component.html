<div class='container'>
  <div class='row'>
    <div class="col"></div>
    <div class="col-6">
      <div class='text-center'>
        <span class="mx-1">
          <input type="text" name="original-word" [attr.maxlength]="maxChar" [attr.class]="inputState" #currentWord (keyup)="updateanAgrams(currentWord.value)">
        </span>
        <span class="mx-1 text-white">
          (Max {{maxChar}} chars)
        </span>
      </div>
      <div class="my-5">
        <p class="alert alert-danger text-center" *ngIf="warningMessage !== ''">
        {{ warningMessage }}
        </p>
      </div>
    </div>
    <div class="col"></div>
  </div>
  <div class='row'>
    <div class="col"></div>
    <div class="col-8">
      <div *ngIf="output.length > 0 && warningMessage === ''" class="bg-info text-center pt-3 mt-5">
        <app-check-words [anagrams]='output'></app-check-words>
        <ul>
          <li class="text-center alert alert-light" *ngFor="let row of output">
            {{ row }}
          </li>
        </ul>
      </div>
    </div>
    <div class="col"></div>
  </div>
</div>
