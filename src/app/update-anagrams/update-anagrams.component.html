<div class='container'>
  <div class='row'>
    <div class="col"></div>
    <div class="col-6">
      <div class='container'>
        <div class='row'>
          <div class="col"><input type="text" name="original-word" [attr.maxlength]="maxChar" [attr.class]="inputState" #currentWord (keyup)="updateanAgrams(currentWord.value)"></div>
          <div class="col">(Max {{maxChar}} chars)</div>
          <div class="col"></div>
        </div>
      </div>
      <div>
        <p class="alert">
        {{ warningMessage }}
        </p>
      </div>
    </div>
    <div class="col"></div>
  </div>
  <div class='row'>
    <div>
      <div *ngIf="output.length > 0" class="list-container">
        <app-check-words></app-check-words>
        <ul>
          <li *ngFor="let row of output">
            {{ row }}
          </li>
        </ul>
      </div>
    </div>
  </div>
</div>
